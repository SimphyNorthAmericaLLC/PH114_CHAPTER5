<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EXP_5_6_3_quiz.html</title>

<style>
body {
  background-color:#1e1e1e;
  color:white;
  font-family: monospace;
  padding:20px;
}

.question {
  margin-bottom:25px;
}

.answers button {
  display:block;
  margin:6px 0;
  padding:8px 12px;
  background:#007acc;
  border:none;
  color:white;
  cursor:pointer;
  width:100%;
  text-align:left;
}

.answers button:hover {
  background:#005f99;
}

#result {
  margin-top:20px;
  font-size:18px;
  font-weight:bold;
}

button.restart {
  margin-top:15px;
  padding:8px 14px;
  background:#444;
}
</style>
</head>

<body>

<h3>EXP_5_6_3_quiz</h3>

<div id="quiz"></div>
<div id="result"></div>

<script>

const questions = [
  {
    question: "The period is about",
    answers: [
      {text: "1.25 s", correct: true},
      {text: "1.35 s", correct: false},
      {text: "1.15 s", correct: false},
      {text: "1.45 s", correct: false}
    ]
  },
  {
    question: "The amplitude of the oscillation is about",
    answers: [
      {text: "0.1 m", correct: false},
      {text: "0.01 m", correct: false},
      {text: "0.5 m", correct: false},
      {text: "0.05 m", correct: true}
    ]
  },
  {
    question: "The estimate of the maximum speed of the bob (small angle approx) is about",
    answers: [
      {text: "0.25 m/s", correct: true},
      {text: "0.15 m/s", correct: false},
      {text: "0.35 m/s", correct: false},
      {text: "0.45 m/s", correct: false}
    ]
  },
  {
    question: "Simphy returns the maximum speed of the bob about",
    answers: [
      {text: "0.26 m/s", correct: true},
      {text: "0.36 m/s", correct: false},
      {text: "0.16 m/s", correct: false},
      {text: "0.46 m/s", correct: false}
    ]
  },
  {
    question: "The estimated max horizontal acceleration of the bob (small angle approx) is about",
    answers: [
      {text: "1.25 m/s^2", correct: true},
      {text: "1.15 m/s^2", correct: false},
      {text: "1.35 m/s^2", correct: false},
      {text: "1.45 m/s^2", correct: false}
    ]
  },
  {
    question: "Simphy returns the max horizontal acceleration of the bob about",
    answers: [
      {text: "1.3 m/s^2", correct: true},
      {text: "1.4 m/s^2", correct: false},
      {text: "1.2 m/s^2", correct: false},
      {text: "1.5 m/s^2", correct: false}
    ]
  }
];

let currentQuestion = 0;
let score = 0;

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function showQuestion() {
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = "";

  if (currentQuestion >= questions.length) {
    document.getElementById("result").innerHTML =
      "Final Score: " + score + " / " + questions.length +
      "<br><button class='restart' onclick='restartQuiz()'>Restart</button>";
    return;
  }

  const q = questions[currentQuestion];
  shuffle(q.answers);

  const questionDiv = document.createElement("div");
  questionDiv.className = "question";
  questionDiv.innerHTML = "<strong>Question " + (currentQuestion+1) + ":</strong><br>" + q.question;

  const answersDiv = document.createElement("div");
  answersDiv.className = "answers";

  q.answers.forEach(answer => {
    const btn = document.createElement("button");
    btn.innerText = answer.text;
    btn.onclick = () => selectAnswer(answer.correct);
    answersDiv.appendChild(btn);
  });

  quizDiv.appendChild(questionDiv);
  quizDiv.appendChild(answersDiv);
}

function selectAnswer(correct) {
  if (correct) score++;
  currentQuestion++;
  showQuestion();
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;
  showQuestion();
}

showQuestion();

</script>

</body>
</html>
